name: Auto Update Index

on:
  push:
    branches:
      - main
    paths:
      - '**.html'       # 當有任何 HTML 檔案變更時才觸發
      - '!index.html'   # 排除 index.html 避免無限提交循環

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Generate Index
      run: python generate_index.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Auto-update index [skip ci]"
        git push origin main
