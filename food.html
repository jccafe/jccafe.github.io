<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三餐營養成分分析系統 - Gemini AI 雲端動態串接版</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --info-color: #2980b9;
            --light-bg: #f8f9fa;
            --border-color: #dee2e6;
        }
        
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; }

        /* API & 新增品項區塊 */
        .control-panel {
            background-color: #ebf5fb;
            border: 1px solid #a9dfbf;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .panel-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .panel-row:last-child { margin-bottom: 0; }

        label { font-weight: bold; color: var(--primary-color); }
        
        input[type="text"], input[type="password"], select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
        }

        button {
            background-color: var(--info-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background-color: #1f618d; }
        button.btn-success { background-color: var(--secondary-color); }
        button.btn-success:hover { background-color: #148f77; }

        .patient-info {
            background-color: var(--light-bg);
            border-left: 5px solid var(--secondary-color);
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 0 4px 4px 0;
        }

        .patient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            font-size: 0.95rem;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 0.9rem; }
        th, td { padding: 10px 8px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--primary-color); color: white; font-weight: 500; }
        .meal-header { background-color: #e8f4f8 !important; font-weight: bold; color: var(--info-color); text-align: left; padding-left: 15px; }

        .total-row { background-color: #eaeded !important; font-weight: bold; color: var(--primary-color); }
        input[type="number"] { width: 65px; padding: 5px; border: 1px solid var(--border-color); border-radius: 4px; text-align: center; }

        .alert-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: white; }
        .bg-danger { background-color: var(--danger-color); }
        .bg-success { background-color: var(--secondary-color); }
        .bg-warning { background-color: var(--warning-color); }

        .analysis-card { background: #fff; border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .analysis-card h3 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid var(--secondary-color); padding-bottom: 5px; }
        .suggestions-list { padding-left: 20px; }
        .suggestions-list li { margin-bottom: 10px; }
        
        #loadingStatus { font-weight: bold; color: var(--warning-color); margin-left: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>三餐飲食營養成分分析系統</h1>
    <p class="subtitle">【跨時代升級】支援 Gemini 2.5 API 即時查詢未建檔食材</p>

    <div class="control-panel">
        <div class="panel-row">
            <label for="apiKey">🔑 Step 1. 請先輸入您的 Gemini API Key：</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." style="max-width: 400px;">
            <span style="font-size: 0.85rem; color: #666;">（金鑰僅存於您的瀏覽器前端，請放心使用）</span>
        </div>
        <div class="panel-row">
            <label>🥗 Step 2. AI 即時查詢並新增三餐品項：</label>
            <select id="targetMeal">
                <option value="breakfast">🌅 納入早餐</option>
                <option value="lunch">☀️ 納入午餐</option>
                <option value="dinner" selected>🌙 納入晚餐</option>
                <option value="supplements">💊 納入補充劑</option>
            </select>
            <input type="text" id="customFoodName" placeholder="例如：煎魚 100克、無糖優格 200g">
            <button class="btn-success" onclick="fetchFoodFromGemini()">向 Gemini 查詢並新增</button>
            <span id="loadingStatus">🔄 AI 連線查詢中，請稍候...</span>
        </div>
    </div>

    <div class="patient-info">
        <div class="patient-grid">
            <span><strong>個案資料：</strong>57歲 / 165 cm / 79 kg (BMI 29.0 輕度肥胖)</span>
            <span><strong>臨床診斷：</strong>高血壓患者</span>
            <span><strong>核心方針：</strong>DASH 飲食指標（控鈉 &le; 2000mg、高鈣 &ge; 1200mg、高纖）</span>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table id="nutritionTable">
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 15px; width: 250px;">餐別與食物品項 (基準單位)</th>
                    <th>輸入數量</th>
                    <th>熱量(大卡)</th>
                    <th>蛋白質(克)</th>
                    <th>膳食纖維(克)</th>
                    <th>鈣(毫克)</th>
                    <th>鐵(毫克)</th>
                    <th>維他命D(微克)</th>
                    <th>鈉(毫克)</th>
                </tr>
            </thead>
            <tbody id="foodList">
                </tbody>
            <tfoot>
                <tr class="total-row" id="totalRow"></tr>
                <tr class="total-row" style="background-color: #e2e4e4 !important;" id="targetRow"></tr>
            </tfoot>
        </table>
    </div>

    <div class="analysis-card">
        <h3>臨床營養綜合評估</h3>
        <div id="clinicalAssessment"></div>
    </div>

    <div class="analysis-card" style="border-left: 5px solid var(--warning-color);">
        <h3>針對高血壓與體重之具體改進建議</h3>
        <ul class="suggestions-list" id="suggestionsList"></ul>
    </div>
</div>

<script>
    // 內建「三餐」基礎數據庫 [cite: 1]
    const foodDatabase = [
        { id: "egg", meal: "breakfast", name: "水煮蛋 (2顆)", qty: 1, kcal: 156, protein: 14, fiber: 0, cal: 60, iron: 2.0, vitD: 2.2, sodium: 160 },
        { id: "toast", meal: "breakfast", name: "麥香土司 (1片)", qty: 1, kcal: 95.2, protein: 3.2, fiber: 0, cal: 0, iron: 0, vitD: 0, sodium: 69 },
        { id: "cheese", meal: "breakfast", name: "起司片 (1片)", qty: 1, kcal: 70, protein: 3.5, fiber: 0, cal: 97.9, iron: 0, vitD: 0, sodium: 344.9 },
        { id: "walnut", meal: "breakfast", name: "胡桃 (10克)", qty: 1, kcal: 69, protein: 0.9, fiber: 0.7, cal: 7, iron: 0.6, vitD: 0, sodium: 0 },
        { id: "chia", meal: "breakfast", name: "奇亞籽 (10克)", qty: 1, kcal: 44.4, protein: 1.6, fiber: 3.8, cal: 62.2, iron: 0.6, vitD: 0, sodium: 1.6 },
        { id: "oat", meal: "breakfast", name: "燕麥片 (15克)", qty: 1, kcal: 56, protein: 2.0, fiber: 1.5, cal: 0, iron: 0, vitD: 0, sodium: 0.8 },
        
        { id: "rice", meal: "lunch", name: "白飯 (100克)", qty: 1, kcal: 130, protein: 2.7, fiber: 0.6, cal: 2, iron: 0.1, vitD: 0, sodium: 2 },
        { id: "spinach_L", meal: "lunch", name: "菠菜 (100克)", qty: 1, kcal: 24, protein: 2.5, fiber: 2.4, cal: 81, iron: 2.1, vitD: 0, sodium: 45 },
        { id: "chicken_L", meal: "lunch", name: "雞里肌肉 (100克)", qty: 1, kcal: 109, protein: 23.4, fiber: 0, cal: 4, iron: 0.4, vitD: 0, sodium: 40 },
        { id: "loofah", meal: "lunch", name: "絲瓜 (30克)", qty: 1, kcal: 5, protein: 0.3, fiber: 0.3, cal: 3, iron: 0.1, vitD: 0, sodium: 1 },
        { id: "carrot", meal: "lunch", name: "紅蘿蔔 (20克)", qty: 1, kcal: 8, protein: 0.2, fiber: 0.5, cal: 5, iron: 0.1, vitD: 0, sodium: 6 },
        { id: "shiitake", meal: "lunch", name: "香菇 (10克)", qty: 1, kcal: 4, protein: 0.3, fiber: 0.4, cal: 0.2, iron: 0.1, vitD: 0, sodium: 0.1 },
        { id: "kimchi_L", meal: "lunch", name: "泡菜 (10克)", qty: 1, kcal: 5.1, protein: 0.2, fiber: 0.4, cal: 0, iron: 0, vitD: 0, sodium: 101.4 },
        
        { id: "instant_noodles", meal: "dinner", name: "統一鮮蝦麵 (1包)", qty: 1, kcal: 360, protein: 9.5, fiber: 1.0, cal: 30, iron: 0.8, vitD: 0, sodium: 1420 },
        { id: "spinach_D", meal: "dinner", name: "菠菜 (100克)", qty: 1, kcal: 24, protein: 2.5, fiber: 2.4, cal: 81, iron: 2.1, vitD: 0, sodium: 45 },
        { id: "chicken_D", meal: "dinner", name: "雞里肌肉 (70克)", qty: 1, kcal: 76.3, protein: 16.4, fiber: 0, cal: 2.8, iron: 0.3, vitD: 0, sodium: 28 },
        { id: "corn", meal: "dinner", name: "玉米 (30克)", qty: 1, kcal: 31, protein: 1.0, fiber: 0.7, cal: 1, iron: 0.2, vitD: 0, sodium: 1 },
        { id: "kimchi_D", meal: "dinner", name: "泡菜 (10克)", qty: 1, kcal: 5.1, protein: 0.2, fiber: 0.4, cal: 0, iron: 0, vitD: 0, sodium: 101.4 },
        { id: "soymilk", meal: "dinner", name: "無糖豆漿 (250毫升)", qty: 1, kcal: 82.5, protein: 8.3, fiber: 3.3, cal: 35, iron: 1.3, vitD: 0, sodium: 12.5 },
        { id: "whey", meal: "dinner", name: "乳清蛋白粉 (10克)", qty: 1, kcal: 38.1, protein: 8.1, fiber: 0, cal: 0, iron: 0, vitD: 0, sodium: 53.1 },
        { id: "sesame", meal: "dinner", name: "芝麻粉 (10克)", qty: 1, kcal: 59, protein: 2.0, fiber: 2.1, cal: 126, iron: 0, vitD: 0, sodium: 1 },
        { id: "banana", meal: "dinner", name: "香蕉 (110克)", qty: 1, kcal: 68, protein: 0.7, fiber: 1.2, cal: 5, iron: 0.3, vitD: 0, sodium: 1 },
        { id: "guava", meal: "dinner", name: "半個芭樂 (130克)", qty: 1, kcal: 49.4, protein: 1.0, fiber: 4.3, cal: 13, iron: 0.3, vitD: 0, sodium: 3.9 },
        
        { id: "multivitamin", meal: "supplements", name: "成人綜合維命 (1錠)", qty: 1, kcal: 0, protein: 0, fiber: 0, cal: 200, iron: 18, vitD: 10, sodium: 0 },
        { id: "vitD3", meal: "supplements", name: "維他命D (400iu)", qty: 1, kcal: 0, protein: 0, fiber: 0, cal: 0, iron: 0, vitD: 10, sodium: 0 }
    ];

    const targetValues = { kcal: 1800, protein: 75, fiber: 25, cal: 1200, iron: 10, vitD: 15, sodium: 2000 };
    const mealNames = { breakfast: "🌅 早餐時段", lunch: "☀️ 午餐時段", dinner: "🌙 晚餐時段", supplements: "💊 每日營養補充劑" };

    function renderTable() {
        const tbody = document.getElementById('foodList');
        tbody.innerHTML = '';
        let currentMeal = "";

        foodDatabase.forEach(food => {
            if (currentMeal !== food.meal) {
                currentMeal = food.meal;
                const headerRow = document.createElement('tr');
                headerRow.innerHTML = `<td colspan="9" class="meal-header">${mealNames[currentMeal]}</td>`;
                tbody.appendChild(headerRow);
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align: left; padding-left: 20px; font-weight: 500;">${food.name}</td>
                <td><input type="number" min="0" max="10" step="0.1" value="${food.qty}" onchange="updateQty('${food.id}', this.value)"></td>
                <td>${(food.kcal * food.qty).toFixed(1)}</td>
                <td>${(food.protein * food.qty).toFixed(1)}</td>
                <td>${(food.fiber * food.qty).toFixed(1)}</td>
                <td>${Math.round(food.cal * food.qty)}</td>
                <td>${(food.iron * food.qty).toFixed(1)}</td>
                <td>${(food.vitD * food.qty).toFixed(1)}</td>
                <td>${(food.sodium * food.qty).toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        });

        renderTargets();
        calculateTotals();
    }

    function updateQty(id, value) {
        const food = foodDatabase.find(f => f.id === id);
        if(food) food.qty = parseFloat(value) || 0;
        renderTable();
    }

    function renderTargets() {
        document.getElementById('targetRow').innerHTML = `
            <td colspan="2" style="text-align: left;">每日膳食臨床目標值</td>
            <td>&le; ${targetValues.kcal}</td>
            <td>~ ${targetValues.protein}</td>
            <td>&ge; ${targetValues.fiber}</td>
            <td>&ge; ${targetValues.cal}</td>
            <td>~ ${targetValues.iron}</td>
            <td>&ge; ${targetValues.vitD}</td>
            <td>&le; ${targetValues.sodium}</td>
        `;
    }

    function calculateTotals() {
        let totals = { kcal: 0, protein: 0, fiber: 0, cal: 0, iron: 0, vitD: 0, sodium: 0 };
        foodDatabase.forEach(food => {
            totals.kcal += food.kcal * food.qty;
            totals.protein += food.protein * food.qty;
            totals.fiber += food.fiber * food.qty;
            totals.cal += food.cal * food.qty;
            totals.iron += food.iron * food.qty;
            totals.vitD += food.vitD * food.qty;
            totals.sodium += food.sodium * food.qty;
        });

        document.getElementById('totalRow').innerHTML = `
            <td colspan="2" style="text-align: left;">目前菜單攝取量總計</td>
            <td>${totals.kcal.toFixed(1)}</td>
            <td>${totals.protein.toFixed(1)}</td>
            <td>${totals.fiber.toFixed(1)}</td>
            <td>${Math.round(totals.cal)}</td>
            <td>${totals.iron.toFixed(1)}</td>
            <td>${totals.vitD.toFixed(1)}</td>
            <td>${totals.sodium.toFixed(1)}</td>
        `;
        generateClinicalAnalysis(totals);
    }

    // 透過 API 串接 Google Gemini 即時查詢並解析未建檔食物
    async function fetchFoodFromGemini() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const foodQuery = document.getElementById('customFoodName').value.trim();
        const targetMeal = document.getElementById('targetMeal').value;
        const statusSpan = document.getElementById('loadingStatus');

        if (!apiKey) { alert("請先填入您的 Gemini API Key！"); return; }
        if (!foodQuery) { alert("請輸入想要查詢並新增的食物品項與重量！"); return; }

        statusSpan.style.display = "inline";

        // 精準約束 Prompt，迫使 Gemini 回傳純 JSON
        const promptText = `你是一位精準的台灣食品營養成分專家。請針對輸入的食物敘述：「${foodQuery}」，依照台灣衛福部食品營養成分資料庫標準，計算出該食物這份量的精確營養成分。
請嚴格以下列 JSON 格式回傳，不要包含任何 markdown 語法 (如 \`\`\`json) 或額外說明文字：
{
  "name": "食物中文名稱(帶上輸入的克數或單位)",
  "kcal": 熱量(大卡, 數值),
  "protein": 蛋白質(克, 數值),
  "fiber": 膳食纖維(克, 數值),
  "cal": 鈣(毫克, 數值),
  "iron": 鐵(毫克, 數值),
  "vitD": 維生素D(微克, 數值),
  "sodium": 鈉(毫克, 數值)
}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            let rawText = data.candidates[0].content.parts[0].text.trim();
            
            // 清理可能殘留的 markdown 標記
            rawText = rawText.replace(/^```json/i, "").replace(/```$/, "").trim();
            const foodJson = JSON.parse(rawText);

            // 塞入前端資料庫
            const newId = "custom_" + Date.now();
            foodDatabase.push({
                id: newId,
                meal: targetMeal,
                name: "✨ " + foodJson.name,
                qty: 1,
                kcal: foodJson.kcal,
                protein: foodJson.protein,
                fiber: foodJson.fiber,
                cal: foodJson.cal,
                iron: foodJson.iron,
                vitD: foodJson.vitD,
                sodium: foodJson.sodium
            });

            // 重新刷新並提示成功
            document.getElementById('customFoodName').value = "";
            renderTable();
            alert(`成功透過 AI 查詢並新增：${foodJson.name}`);

        } catch (error) {
            console.error(error);
            alert("查詢失敗。請確認：1. API Key 是否正確 2. 網路連線是否正常 3. 輸入的食物描述是否有誤。");
        } finally {
            statusSpan.style.display = "none";
        }
    }

    function generateClinicalAnalysis(totals) {
        const assessmentDiv = document.getElementById('clinicalAssessment');
        const suggestionsList = document.getElementById('suggestionsList');
        
        assessmentDiv.innerHTML = '';
        suggestionsList.innerHTML = '';

        let sodiumAlert = totals.sodium > targetValues.sodium ? 
            `<span class="alert-badge bg-danger">鈉量超標</span> 當前總鈉量 ${totals.sodium.toFixed(1)} mg。對於高血壓患者，高鈉會鎖住水分增加心血管壁周邊阻力，請特別小心精緻加工品。` : 
            `<span class="alert-badge bg-success">控鈉理想</span> 鈉攝取量控制在安全範圍。`;

        let calciumAlert = totals.cal >= targetValues.cal ?
            `<span class="alert-badge bg-success">鈣質達標</span> 鈣攝取達 ${Math.round(totals.cal)} mg，搭配維他命D可有效維持平滑肌張力穩定。` :
            `<span class="alert-badge bg-warning">鈣質尚嫌不足</span> 總鈣量未達 1200 mg，不利於高血壓者的神經體液調控。`;

        let kcalAlert = totals.kcal > targetValues.kcal ?
            `<span class="alert-badge bg-warning">熱量偏高</span> 總熱量 ${totals.kcal.toFixed(1)} 大卡。個案屬輕度肥胖，減重能有效降低收縮壓。` :
            `<span class="alert-badge bg-success">熱量理想</span> 熱量處於體重管理安全區間。`;

        assessmentDiv.innerHTML = `
            <p><strong>1. 鈉鹽控管度：</strong>${sodiumAlert}</p>
            <p><strong>2. 降壓元素 (鈣/D3)：</strong>${calciumAlert}</p>
            <p><strong>3. 體重管理控制：</strong>${kcalAlert}</p>
            <p>現階段蛋白質：${totals.protein.toFixed(1)}g / 總纖維：${totals.fiber.toFixed(1)}g。</p>
        `;

        if (totals.sodium > targetValues.sodium) {
            suggestionsList.innerHTML += `<li><strong>減少高鈉加工來源：</strong>若餐單中含有如泡麵調味包（1420mg）、加工起司等，建議減半使用或替換成原態鮮食。</li>`;
        }
        suggestionsList.innerHTML += `<li><strong>利用動態欄位嘗試「減鈉」：</strong>您可以將上方表格內加工品的數量直接調低（例如調整為 0.5 或 0），即時觀察下方降壓指標的變化。</li>`;
    }

    window.onload = renderTable;
</script>

</body>
</html>
